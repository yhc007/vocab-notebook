<h1>📖 기사·책·논문 붙여넣기</h1>
<form class="paste" action="/entries" method="post" enctype="multipart/form-data">
  <div class="row">
    <div>
      <label for="category">카테고리</label>
      <select id="category" name="category">
        <option value="nyt">NYT</option>
        <option value="book">Book</option>
        <option value="paper">Paper</option>
        <option value="other">기타</option>
      </select>
    </div>
    <div>
      <label for="source_detail">출처 (제목/저자 등)</label>
      <input id="source_detail" name="source_detail" placeholder="예: NYT 기사 제목">
    </div>
  </div>
  <label for="source_url">출처 URL (선택)</label>
  <input id="source_url" name="source_url" placeholder="https://...">
  <label for="pdf">PDF 업로드 (선택)</label>
  <input id="pdf" name="pdf" type="file" accept="application/pdf,.pdf">
  <label for="raw_text">본문</label>
  <textarea id="raw_text" name="raw_text" placeholder="여기에 본문을 붙여넣으세요. (비워 두고 URL이나 PDF만 넣어도 됩니다)"></textarea>
  <p class="hint">💡 셋 중 하나만 있으면 됩니다 — 본문 붙여넣기 · URL(자동 수집) · PDF 업로드. 우선순위: PDF &gt; 붙여넣기 &gt; URL. 스캔 이미지 PDF·로그인/JS 페이지는 텍스트가 없을 수 있어요.</p>
  <button type="submit">단어·문장 추출</button>
</form>
